name: Licence check

on:
  push:
  pull_request:

jobs:
  licence-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (sfw-wrapped)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[optional]
          pip install pip-licenses

      - name: Run licence check
        run: |
          python scripts/check_licences.py --check