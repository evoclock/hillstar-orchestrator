name: Deploy Sphinx Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/sphinx/**'
      - 'config/**'
      - 'execution/**'
      - 'governance/**'
      - 'models/**'
      - 'utils/**'
      - 'workflows/**'
      - 'mcp-server/**'
      - 'cli.py'
      - '__init__.py'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install sphinx furo

      - name: Generate MCP server docs
        run: python docs/sphinx/generate_mcp_rst.py

      - name: Build Sphinx HTML
        run: |
          cd docs/sphinx
          make html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/sphinx/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
